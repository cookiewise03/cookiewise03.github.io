# 网站基础信息（也可写在全局 _config.yml）
title: Cookiewise 的博客
# 主页subtitle
subtitle:
    enable: true
    # Typewriter Effect（打字效果）
    effect: true
    startDelay: 300
    typeSpeed: 200
    backSpeed: 800
    # Loop（循环打字）← 改成 false 就不循环了
    loop: true        
    # source 调用三方服务
    source: true
    sub:
        - 长长的时间的旅程充满太多未知的诱惑
description: 个人技术博客，分享学习生活与日常思考
author: cookiewise03
language: zh-CN
timezone: Asia/Shanghai
url: https://cookiewise03.github.io

# 评论系统（推荐 Giscus，最简单免费）
comments:
  use: giscus          # 可选：giscus / gitalk / waline / twikoo
  giscus:
    repo: cookiewise03/cookiewise03.github.io   # 你的仓库
    repo_id: "R_kgDOSyqcGg"                       # 去 https://giscus.app 获取
    category: Announcements
    category_id: "DIC_kwDOSyqcGs4C-nsV"
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: top
    theme: preferred_color_scheme
    lang: zh-CN
    loading: lazy

# 本地搜索（强烈开启）
search:
  use: local_search
  local_search:
    enable: true
    # Preload the search data when the page loads.
    preload: false
    # Show top n results per article, show all results by setting to -1
    top_n_per_article: 1
    # Unescape html strings to the readable one.
    unescape: true
    CDN:

# 暗黑模式
darkmode:
  enable: true
  default: light
  # 其他可根据喜好调整

# 其他常用（根据需要开启）
toc:
  enable: true
math:
  enable: true
  # katex: true

#头像
avatar:
  img: /img/avatar.JPG

#顶部图
index_img: /img/cheer.jpg
default_top_img: /img/cheer.jpg
index_top_img_height: 400px #顶部图高度

# 站点图标
favicon: /img/favicon.jpg

# Navbar 导航栏配置
nav:
  display_title: true            # 是否显示网站标题
  fixed: false                   # 导航栏是否固定（滚动时是否一直停留在顶部）

# 资源文件夹
post_asset_folder: true          # 是否启用文章资源文件夹

# 菜单（Menu）配置
menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  清单||fa fa-heartbeat:         # 带子菜单的菜单项
    电影: /movies/ || fas fa-video

# 侧边栏作者卡片（Follow 按钮）
aside:
  card_author:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/cookiewise03
